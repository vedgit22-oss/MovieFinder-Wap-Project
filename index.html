<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CineWatch | Your Personal Movie Watchlist</title>
    <meta name="description" content="Discover movies and build your personal watchlist with CineWatch. Explore the latest films and keep track of what to watch next.">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-wrapper">
        <header>
            <h1>CineWatch</h1>
            <div class="header-actions">
                <!-- Theme toggle kept for future expansion -->
                <button class="theme-btn" onclick="toggleTheme()" style="display:none;">🌓</button>
            </div>
        </header>

        <div class="container">
            <main class="main-content">
                <section class="search-section">
                    <div class="search-bar">
                        <input type="text" id="searchInput" placeholder="Search for a movie title...">
                        <button onclick="searchMovies()">Search</button>
                    </div>
                </section>

                <section class="filters-section">
                    <div class="filter-group">
                        <label for="sortOption">Sort</label>
                        <select id="sortOption" onchange="applyFeatures()">
                            <option value="default">Release Date</option>
                            <option value="yearDesc">Newest First</option>
                            <option value="alphaAsc">Title (A-Z)</option>
                        </select>
                    </div>
                    
                    <div class="filter-group">
                        <label for="filterOption">Filter</label>
                        <select id="filterOption" onchange="applyFeatures()">
                            <option value="all">All Results</option>
                            <option value="hasPoster">With Posters Only</option>
                        </select>
                    </div>
                </section>

                <div id="loadingMsg" style="display:none;">
                    <div class="loader">Searching the archives...</div>
                </div>
                
                <div id="errorMsg" style="display:none;"></div>

                <div id="resultsDiv">
                    <!-- Movie cards will appear here -->
                </div>
            </main>

            <aside class="watchlist-section">
                <h2>My Watchlist</h2>
                <div id="watchlistDiv">
                    <p style="color: var(--text-secondary);">No movies in watchlist yet.</p>
                </div>
            </aside>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
