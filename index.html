<!DOCTYPE html>
<html>
<head>
    <title>My Simple Movie Watchlist</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
            margin: 20px;
        }
        h1 {
            color: blue;
        }
        .container {
            display: flex;
        }
        .main-content {
            width: 60%;
            padding: 10px;
        }
        .watchlist-section {
            width: 35%;
            background-color: white;
            padding: 10px;
            border: 1px solid black;
            margin-left: 20px;
            height: fit-content;
        }
        .movie-card {
            background-color: white;
            border: 1px solid gray;
            padding: 10px;
            margin-bottom: 10px;
        }
        .movie-card img {
            max-width: 100px;
            display: block;
            margin-top: 5px;
            margin-bottom: 5px;
        }
        .watchlist-item {
            border-bottom: 1px solid lightgray;
            padding: 5px 0;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

    <h1>Find Movies</h1>
    
    <div class="container">
        <div class="main-content">
            <input type="text" id="searchInput" placeholder="Search for a movie...">
            <button onclick="searchMovies()">Search</button>
            
            <p id="loadingMsg" style="display:none;">Loading...</p>
            <p id="errorMsg" style="display:none; color: red;">No movies found</p>
            
            <div id="resultsDiv"></div>
        </div>

        <div class="watchlist-section">
            <h2>My Watchlist</h2>
            <div id="watchlistDiv">
                <p>No movies in watchlist yet.</p>
            </div>
        </div>
    </div>

    <script>
        var watchlist = [];
        var apiKey = "ce434230c3898e1a529b9ebeadc309e1"; // PUT YOUR API KEY HERE

        function searchMovies() {
            var searchBox = document.getElementById("searchInput");
            var keyword = searchBox.value;
            
            var loading = document.getElementById("loadingMsg");
            var error = document.getElementById("errorMsg");
            var results = document.getElementById("resultsDiv");
            
            loading.style.display = "block";
            error.style.display = "none";
            results.innerHTML = ""; 

            var url = "https://www.omdbapi.com/?apikey=" + apiKey + "&s=" + keyword;

            fetch(url)
                .then(function(response) {
                    return response.json();
                })
                .then(function(data) {
                    loading.style.display = "none";
                    
                    if (data.Response == "True") {
                        showMovies(data.Search);
                    } else {
                        error.style.display = "block";
                    }
                })
                .catch(function(error) {
                    loading.style.display = "none";
                    console.log("Error finding movies");
                    alert("Something went wrong with the search.");
                });
        }

        function showMovies(movies) {
            var results = document.getElementById("resultsDiv");
            
            for (var i = 0; i < movies.length; i++) {
                var movie = movies[i];
                
                var card = document.createElement("div");
                card.className = "movie-card";
                
                var title = document.createElement("h3");
                title.innerHTML = movie.Title + " (" + movie.Year + ")";
                
                var img = document.createElement("img");
                if (movie.Poster != "N/A") {
                    img.src = movie.Poster;
                } else {
                    img.alt = "No Image";
                }
                
                var button = document.createElement("button");
                button.innerHTML = "Add to Watchlist";
                button.setAttribute("data-title", movie.Title);
                
                button.onclick = function() {
                    var movieTitle = this.getAttribute("data-title");
                    addToWatchlist(movieTitle);
                };
                
                card.appendChild(title);
                card.appendChild(img);
                card.appendChild(button);
                
                results.appendChild(card);
            }
        }

        function addToWatchlist(movieTitle) {
            var alreadyInList = false;
            
            for (var i = 0; i < watchlist.length; i++) {
                if (watchlist[i] == movieTitle) {
                    alreadyInList = true;
                }
            }
            
            if (alreadyInList == false) {
                watchlist.push(movieTitle);
                updateWatchlistUI();
            } else {
                alert("This movie is already in your watchlist!");
            }
        }

        function updateWatchlistUI() {
            var watchDiv = document.getElementById("watchlistDiv");
            watchDiv.innerHTML = ""; 
            
            if (watchlist.length == 0) {
                watchDiv.innerHTML = "<p>No movies in watchlist yet.</p>";
            } else {
                var list = document.createElement("ul");
                
                for (var i = 0; i < watchlist.length; i++) {
                    var item = document.createElement("li");
                    item.className = "watchlist-item";
                    item.innerHTML = watchlist[i];
                    list.appendChild(item);
                }
                
                watchDiv.appendChild(list);
            }
        }
    </script>
</body>
</html>
